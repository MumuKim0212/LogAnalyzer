name: Build and Release

on:
  push:
    tags:
      - 'v*' # v1.0, v2.0 처럼 v로 시작하는 태그를 푸시할 때만 실행됩니다.

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: windows-latest # WPF 빌드가 포함되어 있으므로 윈도우 환경에서 실행

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 에이전트 프로젝트 빌드 (단일 실행 파일, 런타임 포함)
    - name: Publish LogAnalyzerAgent
      run: dotnet publish LogAnalyzerAgent/LogAnalyzerAgent.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=None -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/LogAnalyzerAgent

    # WPF 클라이언트 프로젝트 빌드 (단일 실행 파일, 런타임 포함)
    - name: Publish LogAnalyzerWPF
      run: dotnet publish LogAnalyzerWPF/LogAnalyzerWPF.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=None -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/LogAnalyzerWPF

    # 빌드된 파일들을 하나의 ZIP 파일로 압축
    - name: Create Zip Archive
      run: Compress-Archive -Path ./publish/* -DestinationPath ./LogAnalyzer-Release.zip

    # GitHub Release 생성 및 ZIP 파일 업로드
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: LogAnalyzer-Release.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
